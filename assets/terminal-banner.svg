<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Terminal showing a JSON response for GET /about — name Geminolah, role Software Engineer, status open to collaborate, focus Java, Spring Boot, React, currently learning Django and React.">
  <defs>
    <linearGradient id="windowBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0A0D12"/>
    </linearGradient>
  </defs>

  <!-- window frame -->
  <rect x="1" y="1" width="898" height="378" rx="14" fill="url(#windowBg)" stroke="#1C212B" stroke-width="1.5"/>

  <!-- title bar -->
  <path d="M14,1 L886,1 Q899,1 899,14 L899,40 L1,40 L1,14 Q1,1 14,1 Z" fill="#11151D"/>
  <line x1="1" y1="40" x2="899" y2="40" stroke="#1C212B" stroke-width="1"/>

  <circle cx="26" cy="20" r="6" fill="#FF5F56"/>
  <circle cx="46" cy="20" r="6" fill="#FFBD2E"/>
  <circle cx="66" cy="20" r="6" fill="#27C93F"/>

  <text x="450" y="24" text-anchor="middle" font-family="Menlo, Consolas, 'JetBrains Mono', monospace" font-size="12" fill="#5A6472">geminolah — zsh</text>

  <!-- body -->
  <g font-family="Menlo, Consolas, 'JetBrains Mono', monospace" font-size="15" xml:space="preserve">

    <text x="32" y="74"><tspan fill="#3DDC84">$ </tspan><tspan fill="#E6E8EB">curl </tspan><tspan fill="#6CB6FF">https://api.geminolah.dev/about</tspan></text>

    <text x="32" y="122" fill="#5A6472">{</text>

    <text x="32" y="150">  <tspan fill="#7EE7C7">"name"</tspan><tspan fill="#5A6472">: </tspan><tspan fill="#F2C572">"Geminolah"</tspan><tspan fill="#5A6472">,</tspan></text>

    <text x="32" y="178">  <tspan fill="#7EE7C7">"role"</tspan><tspan fill="#5A6472">: </tspan><tspan fill="#F2C572">"Software Engineer"</tspan><tspan fill="#5A6472">,</tspan></text>

    <text x="32" y="206">  <tspan fill="#7EE7C7">"status"</tspan><tspan fill="#5A6472">: </tspan><tspan fill="#F2C572">"open_to_collaborate"</tspan><tspan fill="#5A6472">,</tspan></text>

    <text x="32" y="234">  <tspan fill="#7EE7C7">"focus"</tspan><tspan fill="#5A6472">: [</tspan><tspan fill="#F2C572">"Java"</tspan><tspan fill="#5A6472">, </tspan><tspan fill="#F2C572">"Spring Boot"</tspan><tspan fill="#5A6472">, </tspan><tspan fill="#F2C572">"React"</tspan><tspan fill="#5A6472">],</tspan></text>

    <text x="32" y="262">  <tspan fill="#7EE7C7">"currently_learning"</tspan><tspan fill="#5A6472">: [</tspan><tspan fill="#F2C572">"Django"</tspan><tspan fill="#5A6472">, </tspan><tspan fill="#F2C572">"React advanced patterns"</tspan><tspan fill="#5A6472">]</tspan></text>

    <text x="32" y="290" fill="#5A6472">}</text>

    <text x="32" y="334"><tspan fill="#3DDC84">$ </tspan></text>
    <rect x="48" y="320" width="9" height="17" fill="#3DDC84">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>

  </g>
</svg>
